<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية التلاوة | Zeyad Mekawy</title>
    
    <style>
        :root {
            --primary: #0f3433;
            --gold: #d4af37;
            --bg: #fdfbf7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            overscroll-behavior-y: contain;
            touch-action: pan-x pan-y;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #1a472a);
            color: white;
            padding: 25px;
            text-align: center;
            border-bottom: 4px solid var(--gold);
        }

        .container { padding: 15px; max-width: 600px; margin: auto; }

        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid var(--primary);
            font-size: 1rem;
            margin-bottom: 10px;
            background: #fff;
        }

        .player-title { color: var(--primary); font-weight: bold; margin-bottom: 10px; display: block; }

        audio { width: 100%; height: 45px; }

        .live-badge {
            background: red;
            color: white;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.8rem;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .signature { color: var(--primary); font-weight: bold; margin-top: 20px; display: block; }
    </style>
</head>
<body>

<header>
    <h1>إمبراطورية التلاوة</h1>
    <p>بإشراف المطور: Zeyad Mekawy</p>
</header>

<div class="container">

    <div class="card">
        <span class="live-badge">مباشر LIVE</span>
        <span class="player-title">إذاعة القرآن الكريم من القاهرة</span>
        <audio controls>
            <source src="https://stream.zeno.fm/f67798u307zuv" type="audio/mpeg">
        </audio>
    </div>

    <div class="card">
        <span class="player-title">اختر القارئ والسورة</span>
        <select id="readerSelect" onchange="updatePlayer()">
            <option value="https://server8.mp3quran.net/frs_a/002.mp3">فارس عباد - البقرة</option>
            <option value="https://server10.mp3quran.net/minsh/001.mp3">المنشاوي - الفاتحة</option>
            <option value="https://server7.mp3quran.net/basit/055.mp3">عبد الباسط - الرحمن</option>
            <option value="https://server12.mp3quran.net/maher/018.mp3">ماهر المعيقلي - الكهف</option>
            <option value="https://server6.mp3quran.net/shur/036.mp3">الشريم - يس</option>
            <option value="https://server11.mp3quran.net/yasser/056.mp3">ياسر الدوسري - الواقعة</option>
        </select>
        <audio id="mainPlayer" controls>
            <source id="audioSource" src="https://server8.mp3quran.net/frs_a/002.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="card">
        <h2 style="color:var(--primary)">السبحة الإلكترونية</h2>
        <div id="counter" style="font-size: 3rem; font-weight: bold; color: var(--gold);" onclick="count()">0</div>
        <button onclick="count()" style="background: var(--primary); color: white; border: none; padding: 10px 30px; border-radius: 20px; margin-top: 10px;">سبّح</button>
    </div>

</div>

<footer style="text-align: center; padding: 20px;">
    <span class="signature">Zeyad Mekawy</span>
</footer>

<script>
    // تغيير القارئ
    function updatePlayer() {
        const select = document.getElementById('readerSelect');
        const player = document.getElementById('mainPlayer');
        const source = document.getElementById('audioSource');
        
        source.src = select.value;
        player.load();
        player.play();
    }

    // السبحة
    let c = 0;
    function count() {
        c++;
        document.getElementById('counter').innerText = c;
        if (navigator.vibrate) navigator.vibrate(50);
    }
</script>

</body>
</html>
