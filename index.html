<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEYAD MEGA EMPIRE | الإمبراطورية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --dark: #050505; --gold: #ffd700; --red: #ff4b2b; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        
        nav { background: rgba(0,0,0,0.95); padding: 10px; display: flex; overflow-x: auto; gap: 8px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--neon); scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav button { background: rgba(255,255,255,0.05); border: 1px solid var(--neon); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; white-space: nowrap; font-family: 'Cairo'; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .active-btn { background: var(--neon) !important; color: black !important; box-shadow: 0 0 15px var(--neon); }

        .page { display: none; max-width: 90%; margin: 15px auto; padding: 10px; text-align: center; }
        .show { display: block !important; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid rgba(0,242,255,0.2); backdrop-filter: blur(15px); margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        
        /* تعديل الأزرار عشان متطلعش بره الإطار */
        .btn-link { 
            display: block; 
            width: 100%; 
            max-width: 100%; 
            padding: 12px 5px; 
            margin: 10px 0; 
            border: 1px solid var(--purple); 
            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            background: rgba(188, 19, 254, 0.1); 
            font-weight: bold; 
            font-size: 14px; 
            cursor: pointer; 
            text-align: center;
            box-sizing: border-box; /* بيخلي الحدود جوه المساحة المحسوبة */
        }
        
        .grid-games { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        
        .wa-float { position: fixed; bottom: 15px; left: 15px; background: #25d366; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 25px; text-decoration: none; box-shadow: 0 0 15px #25d366; z-index: 1000; }
        input { width: 90%; padding: 10px; border-radius: 10px; border: 1px solid var(--neon); background: #111; color: white; margin: 10px 0; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>
<a href="https://wa.me/201148175381" class="wa-float" target="_blank">💬</a>

<nav>
    <button onclick="st('home', this)" class="active-btn">🏠 الرئيسية</button>
    <button onclick="st('games', this)">🎮 مركز الألعاب</button>
    <button onclick="st('study', this)">📚 المذاكرة</button>
    <button onclick="st('ai', this)">🤖 ذكاء اصطناعي</button>
    <button onclick="st('media', this)">🎬 ميديا</button>
    <button onclick="st('tech', this)">💻 مبرمجين</button>
    <button onclick="st('islam', this)">🕋 إسلاميات</button>
    <button onclick="st('secret', this)">🔐 الخزنة</button>
</nav>

<div id="home" class="page show">
    <div class="card">
        <h1 style="color: var(--neon); font-size: 24px;">👑 إمبراطورية ZEYAD</h1>
        <p style="font-size: 14px;">أهلاً بك في النسخة النهائية المنسقة تماماً.</p>
        <div class="card" style="border-color: var(--gold); padding: 10px;">
            <h3 style="color: var(--gold); font-size: 18px;">📥 التحميلات الرسمية</h3>
            <a href="https://www.appcreator24.com/app3947806-z45quj" class="btn-link" style="background: linear-gradient(45deg, #ffd700, #ff8c00); color: black; border: none;">📱 تحميل التطبيق الرسمي (APK)</a>
            <a href="https://www.mediafire.com/folder/hzyq8ztab32un/تخ" class="btn-link" style="border-color: #007bff; color: #007bff;">📁 تحميل مجلد الأكواد (MediaFire)</a>
        </div>
    </div>
</div>

<div id="games" class="page">
    <div class="card">
        <h2 style="color: var(--neon); font-size: 20px;">🎮 مركز الألعاب</h2>
        <div class="grid-games">
            <a href="https://poki.com/en/g/subway-surfers" class="btn-link" style="border-color: #ffcc00; font-size: 12px;">🏃 Subway</a>
            <a href="https://poki.com/en/g/temple-run-2" class="btn-link" style="border-color: #4caf50; font-size: 12px;">🏃 Temple Run</a>
            <a href="https://poki.com/en/g/fireboy-and-watergirl-1" class="btn-link" style="border-color: #ff4b2b; font-size: 12px;">🔥 Fire & Water</a>
            <a href="https://poki.com/en/g/tictactoe" class="btn-link" style="border-color: #00f2ff; font-size: 12px;">❌ Tic Tac Toe</a>
        </div>
    </div>
</div>

<div id="secret" class="page">
    <div class="card" style="border-color: var(--gold);">
        <h2>🔐 الخزنة الملكية</h2>
        <input type="password" id="pass" placeholder="الباسورد السري...">
        <button class="btn-link" onclick="chk()">فتح الإحصائيات 🔓</button>
        <div id="sc" style="display:none; margin-top:15px;">
            <img src="https://profile-counter.glitch.me/fuv-ops/count.svg" style="max-width: 100%;">
        </div>
    </div>
</div>

<script>
    function st(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
        document.getElementById(id).classList.add('show');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn'));
        btn.classList.add('active-btn');
    }
    function chk() {
        if(document.getElementById('pass').value === "1148175381") document.getElementById('sc').style.display = 'block';
        else alert("غلط يا زعيم!");
    }
    // كود الماتريكس (ZEYAD)
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/16)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#00f2ff"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            ctx.fillText("ZEYAD", i*16, y*16);
            if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 33);
</script>
</body>
</html>
