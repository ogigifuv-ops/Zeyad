<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEYAD EMPIRE | النسخة الشغالة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --dark: #050505; --gold: #ffd700; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        
        /* شريط الأزرار - اتأكد إنه شغال سكرول */
        nav { background: rgba(0,0,0,0.95); padding: 10px; display: flex; overflow-x: auto; gap: 8px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--neon); }
        nav button { background: rgba(255,255,255,0.05); border: 1px solid var(--neon); color: white; padding: 10px 18px; border-radius: 10px; cursor: pointer; white-space: nowrap; font-family: 'Cairo'; font-weight: bold; font-size: 13px; }
        .active-btn { background: var(--neon) !important; color: black !important; }

        .page { display: none; width: 90%; margin: 20px auto; text-align: center; }
        .show { display: block !important; }

        .card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid rgba(0,242,255,0.2); margin-bottom: 15px; box-sizing: border-box; }
        
        /* تصليح الأزرار عشان متطلعش بره */
        .btn-link { 
            display: block; 
            width: 100%; 
            padding: 12px 0; 
            margin: 10px 0; 
            border: 1px solid var(--purple); 
            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            background: rgba(188, 19, 254, 0.1); 
            font-weight: bold; 
            box-sizing: border-box;
        }
        
        .wa-float { position: fixed; bottom: 15px; left: 15px; background: #25d366; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; z-index: 2000; box-shadow: 0 0 15px #25d366; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>
<a href="https://wa.me/201148175381" class="wa-float">💬</a>

<nav id="topNav">
    <button onclick="st('home', this)" class="active-btn">🏠 الرئيسية</button>
    <button onclick="st('games', this)">🎮 الألعاب</button>
    <button onclick="st('study', this)">📚 المذاكرة</button>
    <button onclick="st('secret', this)">🔐 الخزنة</button>
</nav>

<div id="home" class="page show">
    <div class="card">
        <h1 style="color: var(--neon);">👑 إمبراطورية ZEYAD</h1>
        <div class="card" style="border-color: var(--gold);">
            <h3 style="color: var(--gold);">📥 التحميلات</h3>
            <a href="https://www.appcreator24.com/app3947806-z45quj" class="btn-link" style="background: var(--gold); color: black;">📱 تحميل التطبيق (APK)</a>
            <a href="https://www.mediafire.com/folder/hzyq8ztab32un/تخ" class="btn-link">📁 مجلد الأكواد</a>
        </div>
    </div>
</div>

<div id="games" class="page">
    <div class="card">
        <h2 style="color: var(--neon);">🎮 ألعاب أونلاين</h2>
        <a href="https://poki.com/en/g/subway-surfers" class="btn-link">🏃 Subway Surfers</a>
        <a href="https://poki.com/en/g/tictactoe" class="btn-link">❌ Tic Tac Toe</a>
    </div>
</div>

<div id="study" class="page">
    <div class="card">
        <h2>📚 ركن المذاكرة</h2>
        <a href="https://www.google.com/search?q=ترجمة" class="btn-link">🔤 ترجمة فورية</a>
    </div>
</div>

<div id="secret" class="page">
    <div class="card" style="border-color: var(--gold);">
        <h2>🔐 الخزنة السرية</h2>
        <input type="password" id="pass" style="width: 80%; padding: 10px; margin: 10px 0; background: #000; color: #fff; border: 1px solid var(--gold); border-radius: 10px;" placeholder="اكتب الباسورد...">
        <button class="btn-link" onclick="chk()">فتح الإحصائيات</button>
        <div id="sc" style="display:none; margin-top:15px;">
            <img src="https://profile-counter.glitch.me/fuv-ops/count.svg" alt="Counter">
        </div>
    </div>
</div>

<script>
    // دالة التنقل - اتأكدت إنها شغالة تمام
    function st(pageId, btn) {
        // 1. إخفاء كل الصفحات
        var pages = document.getElementsByClassName('page');
        for (var i = 0; i < pages.length; i++) {
            pages[i].style.display = 'none';
        }
        // 2. إظهار الصفحة المطلوبة
        document.getElementById(pageId).style.display = 'block';
        
        // 3. تغيير شكل الزرار النشط
        var buttons = document.querySelectorAll('nav button');
        buttons.forEach(function(b) { b.classList.remove('active-btn'); });
        btn.classList.add('active-btn');
    }

    function chk() {
        if(document.getElementById('pass').value === "1148175381") {
            document.getElementById('sc').style.display = 'block';
        } else {
            alert("الباسورد غلط!");
        }
    }

    // كود الماتريكس
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/16)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#00f2ff"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            ctx.fillText("ZEYAD", i*16, y*16);
            if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 33);
</script>
</body>
</html>
