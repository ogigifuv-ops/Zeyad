<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية زياد | الشغالة 100%</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --dark: #080808; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        
        /* Navbar شغال باللمس والضغط */
        nav { background: rgba(0,0,0,0.95); padding: 15px; display: flex; overflow-x: auto; gap: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--neon); }
        nav button { background: none; border: 1px solid var(--neon); color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-family: 'Cairo'; transition: 0.3s; }
        nav button.active-nav { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        .container { max-width: 900px; margin: 20px auto; padding: 20px; display: none; }
        .active-page { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; border: 1px solid rgba(0,242,255,0.3); backdrop-filter: blur(15px); text-align: center; }
        .btn-link { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid var(--purple); color: white; text-decoration: none; border-radius: 15px; font-weight: bold; background: rgba(188, 19, 254, 0.1); }
        .btn-link:hover { background: var(--purple); box-shadow: 0 0 20px var(--purple); }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<nav id="navbar">
    <button onclick="openPage('home', this)" class="active-nav">🏰 الرئيسية</button>
    <button onclick="openPage('apps', this)">📱 التطبيقات</button>
    <button onclick="openPage('games', this)">🎮 الألعاب</button>
    <button onclick="openPage('hacker', this)">💻 الهكر</button>
</nav>

<div id="home" class="container active-page">
    <div class="card">
        <h1 style="font-size: 35px;">👑 إمبراطورية ZEYAD</h1>
        <p>أهلاً بك في أضخم منصة برمجية صنعها زياد. الأزرار الآن تعمل بكفاءة!</p>
        <div class="card" style="margin-top:20px; border-color: var(--purple);">
            <h3>⭐ تقييمنا: 5.0</h3>
            <h3>👥 مستخدمينا: +10K</h3>
        </div>
    </div>
</div>

<div id="apps" class="container">
    <div class="card">
        <h2>📱 تطبيقات زياد الحصرية</h2>
        <a href="#" class="btn-link">🕋 تطبيق الصلاة</a>
        <a href="#" class="btn-link">📝 محرر الأكواد</a>
        <a href="#" class="btn-link">🧹 منظف الهاتف</a>
    </div>
</div>

<div id="games" class="container">
    <div class="card">
        <h2>🎮 صالة الألعاب</h2>
        <p>لعبة "تحطيم الأرقام" قريباً!</p>
        <button class="btn-link" onclick="alert('اللعبة تحت التطوير يا بطل!')">العب الآن</button>
    </div>
</div>

<div id="hacker" class="container">
    <div class="card" style="border-color: #0f0;">
        <h2 style="color: #0f0;">💻 وضع الاختراق الوهمي</h2>
        <div id="console" style="text-align: left; font-family: monospace; color: #0f0; background: #000; padding: 10px; height: 150px; overflow-y: auto;">
            > النظام جاهز للأوامر...
        </div>
        <button class="btn-link" style="border-color: #0f0; color: #0f0;" onclick="startHack()">تشغيل الهجوم 🧨</button>
    </div>
</div>

<script>
    // برمجة الأزرار عشان تشتغل
    function openPage(pageId, btn) {
        // إخفاء كل الصفحات
        document.querySelectorAll('.container').forEach(p => p.classList.remove('active-page'));
        // إظهار الصفحة المطلوبة
        document.getElementById(pageId).classList.add('active-page');
        
        // تغيير شكل الزرار النشط
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        btn.classList.add('active-nav');
    }

    function startHack() {
        const c = document.getElementById('console');
        const lines = ["> Finding IP...", "> Bypassing Firewall...", "> Access Granted!", "> Downloading Data..."];
        let i = 0;
        const inv = setInterval(() => {
            c.innerHTML += `<br>> ${lines[i]}`;
            c.scrollTop = c.scrollHeight;
            i++; if(i>=lines.length) clearInterval(inv);
        }, 600);
    }

    // Matrix Background
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "ZEYAD1010";
    const drops = Array(Math.floor(canvas.width/16)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#00f2ff"; ctx.font = "16px monospace";
        drops.forEach((y, i) => {
            const text = letters[Math.floor(Math.random()*letters.length)];
            ctx.fillText(text, i*16, y*16);
            if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 33);
</script>
</body>
</html>
