<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeyad AI Pro</title>
    <style>
        /* كود الـ CSS هنا */
        body { font-family: sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 95%; max-width: 500px; background: #16213e; border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; height: 85vh; border: 1px solid #0f3460; }
        header { background: #0f3460; padding: 15px; text-align: center; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 10px; max-width: 80%; }
        .bot { background: #e94560; align-self: flex-start; }
        .user { background: #0f3460; align-self: flex-end; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: #1a1a2e; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; outline: none; background: #fff; color: #000; }
        button { padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-container">
        <header><h1>🤖 Zeyad AI Pro</h1><p>المطور: زياد</p></header>
        <div id="chat-box" class="chat-box"><div class="message bot">أهلاً بك! أنا ذكاء زياد الاصطناعي، اسألني أي حاجة.</div></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="اكتب سؤالك...">
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <script>
        // كود الـ Javascript هنا
        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const API_KEY = "AIzaSyA2BCGbKTMU72CIh3liFmVyjOX8rBbgbPM";

        sendBtn.onclick = async () => {
            const text = userInput.value;
            if (!text) return;
            chatBox.innerHTML += `<div class="message user">${text}</div>`;
            userInput.value = "";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<div class="message bot">${botReply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                chatBox.innerHTML += `<div class="message bot">فيه مشكلة فنية، جرب تاني يا زياد.</div>`;
            }
        };
    </script>
</body>
</html>
