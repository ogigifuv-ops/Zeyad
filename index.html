<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية زياد | الشغالة 100%</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --dark: #080808; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        
        /* Navbar ثابت وشغال */
        nav { 
            background: rgba(0,0,0,0.95); padding: 15px; display: flex; 
            overflow-x: auto; gap: 10px; position: sticky; top: 0; 
            z-index: 100; border-bottom: 2px solid var(--neon); 
        }
        nav button { 
            background: rgba(255,255,255,0.1); border: 1px solid var(--neon); 
            color: white; padding: 10px 20px; border-radius: 15px; 
            cursor: pointer; white-space: nowrap; font-family: 'Cairo'; 
            font-weight: bold; transition: 0.3s;
        }
        /* شكل الزرار لما يكون شغال */
        .btn-active { background: var(--neon) !important; color: black !important; box-shadow: 0 0 15px var(--neon); }

        .page { display: none; max-width: 900px; margin: 20px auto; padding: 20px; text-align: center; }
        .show { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }

        .card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; border: 1px solid rgba(0,242,255,0.3); backdrop-filter: blur(15px); }
        .item { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 1px solid var(--purple); color: white; text-decoration: none; border-radius: 12px; background: rgba(188, 19, 254, 0.1); font-weight: bold; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<nav>
    <button onclick="changePage('p1', this)" class="btn-active">🏰 الرئيسية</button>
    <button onclick="changePage('p2', this)">📱 التطبيقات</button>
    <button onclick="changePage('p3', this)">🎮 الألعاب</button>
    <button onclick="changePage('p4', this)">💻 الهكر</button>
</nav>

<div id="p1" class="page show">
    <div class="card">
        <h1>👑 إمبراطورية ZEYAD</h1>
        <p>الأزرار اللي فوق دلوقتي هتنقلك بين الأقسام بلمسة واحدة.</p>
        <div style="display: flex; justify-content: space-around; margin-top: 20px;">
            <div>⭐ 5.0</div>
            <div>👥 +10K</div>
        </div>
    </div>
</div>

<div id="p2" class="page">
    <div class="card">
        <h2>📱 تطبيقات زياد الحصرية</h2>
        <div class="item">🕋 تطبيق الصلاة (قريباً)</div>
        <div class="item">📝 محرر الأكواد Pro</div>
        <div class="item">🧹 منظف الهاتف السريع</div>
    </div>
</div>

<div id="p3" class="page">
    <div class="card">
        <h2>🎮 صالة الألعاب</h2>
        <p>خمن الرقم السري واكسب نقط!</p>
        <input type="number" id="guess" style="width: 80%; padding: 10px; margin-bottom: 10px;" placeholder="اكتب رقم...">
        <button class="item" onclick="alert('حاول مرة أخرى!')">تحقق 🎲</button>
    </div>
</div>

<div id="p4" class="page">
    <div class="card" style="border-color: #0f0;">
        <h2 style="color: #0f0;">💻 Terminal Mode</h2>
        <div id="log" style="text-align: left; background: #000; color: #0f0; padding: 10px; height: 100px; overflow-y: auto; font-family: monospace;">
            > System Ready...
        </div>
        <button class="item" style="border-color: #0f0; color: #0f0;" onclick="hack()">ابدأ الهجوم 🧨</button>
    </div>
</div>

<script>
    // الوظيفة السحرية لتغيير الصفحات
    function changePage(pageId, btn) {
        // 1. إخفاء كل الصفحات
        document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
        // 2. إظهار الصفحة اللي اخترتها
        document.getElementById(pageId).classList.add('show');
        
        // 3. مسح اللون من كل الأزرار
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('btn-active'));
        // 4. تلوين الزرار اللي دست عليه
        btn.classList.add('btn-active');
    }

    function hack() {
        const l = document.getElementById('log');
        l.innerHTML += "<br>> Accessing Mainframe...";
        l.scrollTop = l.scrollHeight;
    }

    // Matrix Effect
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/16)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#00f2ff"; ctx.font = "16px monospace";
        drops.forEach((y, i) => {
            ctx.fillText("Z", i*16, y*16);
            if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 33);
</script>
</body>
</html>
