<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية التلاوة | Zeyad Mekawy</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --emerald: #014436; --dark: #010c0a; --neon: 0 0 15px #ffcc00; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Cairo', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; }
        
        .whatsapp-float { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 1000; text-decoration: none; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        header { background: linear-gradient(to bottom, var(--emerald), var(--dark)); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1001; }
        header h1 { font-family: 'Amiri', serif; font-size: 24px; color: var(--gold); margin: 0; text-shadow: var(--neon); }

        nav { display: flex; overflow-x: auto; background: #000; padding: 10px; gap: 8px; border-bottom: 2px solid var(--gold); position: sticky; top: 65px; z-index: 1000; scrollbar-width: none; }
        nav button { background: rgba(255, 204, 0, 0.1); border: 1px solid var(--gold); color: white; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-family: 'Cairo'; font-weight: bold; }
        .active-btn { background: var(--gold) !important; color: black !important; }

        .main-display { flex-grow: 1; padding: 15px; background: radial-gradient(circle, #022b22, #010c0a); }
        .page { display: none; animation: fadeIn 0.3s ease; max-width: 800px; margin: auto; }
        .show-page { display: block !important; }

        .card { background: rgba(1, 68, 54, 0.6); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid var(--gold); background: #000; color: white; margin-bottom: 15px; font-family: 'Cairo'; outline: none; box-sizing: border-box; }

        .s-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .s-btn { background: rgba(1, 68, 54, 0.8); color: white; border: 1.5px solid var(--gold); padding: 12px 5px; border-radius: 10px; cursor: pointer; text-align: center; font-size: 14px; font-weight: bold; }

        .radio-btn { background: rgba(1, 68, 54, 0.9); color: white; border: 2px solid var(--gold); padding: 18px; border-radius: 15px; width: 100%; margin-bottom: 12px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; font-size: 16px; transition: 0.3s; display: block; }
        .radio-btn:hover { background: var(--gold); color: black; }

        .player-container { background: #000; border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid var(--gold); text-align: center; }
        audio { width: 100%; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header><h1>✨ إِمْبَرَاطُورِيَّةُ التِّلَاوَةِ ✨</h1></header>

<nav id="navbar">
    <button onclick="go('p1', this)" class="active-btn">🏠 الرئيسية</button>
    <button onclick="go('p3', this)">📖 المصحف</button>
    <button onclick="go('p10', this)">📿 السبحة</button>
    <button onclick="go('p12', this)">📻 الراديو</button>
    <button onclick="go('p11', this)">🌟 الأسماء</button>
    </nav>

<div class="main-display">
    <div id="p1" class="page show-page">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--gold);">مرحباً يا إمبراطور زياد</h2>
            <p>تم تحديث السيرفرات لتعمل بأقصى سرعة (بدون تأخير).</p>
        </div>
    </div>

    <div id="p12" class="page">
        <div class="card" style="text-align:center;">
            <h3 style="color:var(--gold);">📻 الراديو والتمجيد (سيرفرات سريعة)</h3>
            
            <button class="radio-btn" onclick="playAudio('https://backup.qurango.net/radio/tarabeel.mp3', 'تلاوات نادرة ومختارة')">📻 تلاوات مختارة (سريع جداً)</button>
            <button class="radio-btn" onclick="playAudio('https://backup.qurango.net/radio/mohammad_siddiq_alminshawi_mojawwad', 'مكتبة المنشاوي المجودة كاملة')">📻 مكتبة الشيخ المنشاوي (كاملة)</button>
            <button class="radio-btn" onclick="playAudio('https://backup.qurango.net/radio/mahmoud_khalil_alhussary_mojawwad', 'مكتبة الحصري المجودة كاملة')">📻 مكتبة الشيخ الحصري (كاملة)</button>

            <div id="audio-player-box" class="player-container" style="display:none;">
                <p id="now-playing" style="color:var(--gold); font-weight: bold;"></p>
                <audio id="global-player" controls autoplay><source id="global-src" src=""></audio>
            </div>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="card">
            <h3>📖 المصحف الشريف (تحميل فوري)</h3>
            <input type="text" id="surahSearch" class="search-box" placeholder="🔍 ابحث عن السورة...">
            <select id="reciter" class="search-box" style="background: var(--emerald);">
                <option value="minsh">محمد صديق المنشاوي</option>
                <option value="husr">محمود خليل الحصري</option>
                <option value="basit">عبد الباسط عبد الصمد</option>
            </select>
            <div id="surah-container" class="s-grid"></div>
        </div>
    </div>
</div>

<a href="https://wa.me/201148175381" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script>
    function go(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('show-page'));
        document.getElementById(pageId).classList.add('show-page');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn'));
        btn.classList.add('active-btn');
    }

    // وظيفة التشغيل السريع
    function playAudio(url, title) {
        const box = document.getElementById('audio-player-box');
        const player = document.getElementById('global-player');
        const src = document.getElementById('global-src');
        const titleDisplay = document.getElementById('now-playing');

        box.style.display = 'block';
        titleDisplay.innerText = "جاري التشغيل: " + title;
        src.src = url;
        player.load();
        player.play();
        box.scrollIntoView({ behavior: 'smooth' });
    }

    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
    
    // روابط السيرفرات السريعة جداً
    const servers = { 
        'minsh': 'https://server10.mp3quran.net/minsh/', 
        'husr': 'https://server13.mp3quran.net/husr/', 
        'basit': 'https://server7.mp3quran.net/basit/' 
    };

    const container = document.getElementById('surah-container');
    suras.forEach((name, index) => {
        let b = document.createElement('button'); b.className = 's-btn'; b.innerText = name;
        b.onclick = () => {
            let rec = document.getElementById('reciter').value;
            let id = (index + 1).toString().padStart(3, '0');
            // الرابط الجديد سريع جداً
            playAudio(servers[rec] + id + '.mp3', "سورة " + name);
        };
        container.appendChild(b);
    });

    document.getElementById('surahSearch').onkeyup = function() {
        let val = this.value;
        document.querySelectorAll('#surah-container .s-btn').forEach(b => {
            b.style.display = b.innerText.includes(val) ? "block" : "none";
        });
    };
</script>
</body>
</html>
